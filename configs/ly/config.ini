# hackOS :: ly config — modo Matrix (lluvia de caracteres) simple
#
# La animacion "matrix" es nativa de ly: dibuja la lluvia clasica en verde
# sobre fondo negro. Dejamos ese verde tal cual (es lo que la hace
# reconocible como "Matrix"), y usamos el rosa de marca de hackOS solo en
# la caja de login/texto, para que se note que es hackOS y no un ly genérico.
animation = matrix

clock = %H:%M:%S  %d/%m/%Y
asterisk = *
blank_box = false
hide_borders = false

bg = 0x000000
fg = 0xEA0057
border_fg = 0x2E9FDB
error_bg = 0x000000
error_fg = 0xFF5555

default_input = login
save = true
load = true
